server {
    listen 80;
    server_name 65-0-95-21.sslip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 65-0-95-21.sslip.io;

    ssl_certificate /etc/letsencrypt/live/65-0-95-21.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/65-0-95-21.sslip.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://localhost:5050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeouts for long-running Twilio websockets
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
